<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tetris — KQ Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Mono', monospace;
            background: #0d1117;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            padding: 10px;
            user-select: none;
            overflow: hidden;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 450px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .back-btn {
            border: 1px solid #2a2a3e;
            color: #aaa;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7em;
            text-decoration: none;
        }

        .title {
            font-size: 1em;
            letter-spacing: 2px;
            color: #00e5ff;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 500px;
            gap: 10px;
            overflow: hidden;
        }

        .game-area {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            justify-content: center;
        }

        .board-wrap {
            position: relative;
            background: #0a0e14;
            border: 2px solid #00e5ff;
            border-radius: 6px;
        }

        canvas#board { display: block; }

        .side-panel { display: flex; flex-direction: column; gap: 6px; }

        .panel-box {
            background: #111827;
            border: 1px solid #1e2433;
            border-radius: 6px;
            padding: 8px;
            text-align: center;
        }

        .panel-label { font-size: 0.5em; color: #555; text-transform: uppercase; }
        .panel-value { font-size: 1em; color: #fff; font-weight: 700; }

        .controls-wrap {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-bottom: 15px;
            flex-shrink: 0;
        }

        .controls-row { display: flex; justify-content: center; gap: 10px; }

        .ctrl-btn {
            width: 65px;
            height: 55px;
            background: #111827;
            border: 1px solid #1e2433;
            border-radius: 10px;
            color: #fff;
            font-size: 1.4em;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        .ctrl-btn:active { background: #00e5ff; color: #000; }
        .pause-ctrl { background: #ff9800; border: none; }

        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 14, 20, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .start-btn {
            background: #00e5ff;
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="javascript:history.back()" class="back-btn">← Back</a>
        <div class="title">TETRIS</div>
        <div style="width: 50px;"></div>
    </div>

    <div class="main-container">
        <div class="game-area">
            <div class="board-wrap">
                <canvas id="board"></canvas>
                <div class="overlay" id="overlay">
                    <div id="overlay-msg" style="margin-bottom:10px">TETRIS</div>
                    <button class="start-btn" onclick="startGame()">MULAI</button>
                </div>
            </div>

            <div class="side-panel">
                <div class="panel-box">
                    <div class="panel-label">Skor</div>
                    <div class="panel-value" id="score">0</div>
                </div>
                <div class="panel-box">
                    <div class="panel-label">Next</div>
                    <canvas id="nextCanvas"></canvas>
                </div>
                <div class="panel-box">
                    <div class="panel-label">Lines</div>
                    <div class="panel-value" id="lines">0</div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls-wrap">
        <div class="controls-row">
            <button class="ctrl-btn" onpointerdown="startMove(moveLeft)" onpointerup="stopMove()" onpointerleave="stopMove()">◀</button>
            <button class="ctrl-btn" onpointerdown="startMove(softDrop)" onpointerup="stopMove()" onpointerleave="stopMove()">▼</button>
            <button class="ctrl-btn" onpointerdown="startMove(moveRight)" onpointerup="stopMove()" onpointerleave="stopMove()">▶</button>
        </div>
        <div class="controls-row">
            <button class="ctrl-btn" onclick="rotate()">↻</button>
            <button class="ctrl-btn pause-ctrl" onclick="togglePause()">⏸</button>
            <button class="ctrl-btn" onclick="hardDrop()">⏬</button>
        </div>
    </div>

    <script>
        // --- AUDIO ENGINE (Hanya Suara Pecah) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playExplosionSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        // --- GAME VARIABLES ---
        const board = document.getElementById('board');
        const ctx = board.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nCtx = nextCanvas.getContext('2d');
        const COLS = 10, ROWS = 20;
        let CELL, grid, piece, nextPiece, score, level, lines, running = false, paused = false, gameInterval, moveInterval;
        let particles = [];

        function resizeGame() {
            const availableHeight = window.innerHeight - 240;
            CELL = Math.floor(availableHeight / ROWS);
            if (CELL * COLS > window.innerWidth - 120) CELL = Math.floor((window.innerWidth - 120) / COLS);
            board.width = COLS * CELL; board.height = ROWS * CELL;
            nextCanvas.width = 4 * CELL; nextCanvas.height = 4 * CELL;
        }

        const COLORS = { I: '#00e5ff', O: '#ffd600', T: '#aa00ff', S: '#00e676', Z: '#ff1744', J: '#2979ff', L: '#ff9100' };
        const SHAPES = {
            I: [[1,1,1,1]], O: [[1,1],[1,1]], T: [[0,1,0],[1,1,1]],
            S: [[0,1,1],[1,1,0]], Z: [[1,1,0],[0,1,1]], J: [[1,0,0],[1,1,1]], L: [[0,0,1],[1,1,1]],
        };

        function createGrid() { return Array.from({length: ROWS}, () => Array(COLS).fill(null)); }
        function randomPiece() {
            const types = Object.keys(SHAPES);
            const type = types[Math.floor(Math.random() * types.length)];
            return { type, shape: SHAPES[type].map(r => [...r]), x: Math.floor(COLS / 2) - Math.floor(SHAPES[type][0].length / 2), y: 0, color: COLORS[type] };
        }

        function collides(p = piece, g = grid) {
            for (let r = 0; r < p.shape.length; r++) {
                for (let c = 0; c < p.shape[r].length; c++) {
                    if (!p.shape[r][c]) continue;
                    const nx = p.x + c, ny = p.y + r;
                    if (nx < 0 || nx >= COLS || ny >= ROWS || (ny >= 0 && g[ny][nx])) return true;
                }
            }
            return false;
        }

        // --- PARTICLE EFFECT ---
        function createParticles(x, y, color) {
            for (let i = 0; i < 6; i++) {
                particles.push({
                    x: x * CELL + CELL/2, y: y * CELL + CELL/2,
                    vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.8) * 8,
                    life: 1.0, color: color
                });
            }
        }

        function updateAndDrawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life -= 0.03;
                if (p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, CELL/4, CELL/4);
            }
            ctx.globalAlpha = 1.0;
        }

        // --- CONTROLS ---
        function startMove(action) { if (running && !paused) { action(); clearInterval(moveInterval); moveInterval = setInterval(action, 90); } }
        function stopMove() { clearInterval(moveInterval); }

        function rotate() {
            if (!running || paused || !piece) return;
            const rotated = piece.shape[0].map((_, i) => piece.shape.map(row => row[i]).reverse());
            const prev = piece.shape;
            piece.shape = rotated;
            if (collides()) piece.shape = prev;
            draw();
        }

        function moveLeft() { if (running && !paused && piece) { piece.x--; if (collides()) piece.x++; draw(); } }
        function moveRight() { if (running && !paused && piece) { piece.x++; if (collides()) piece.x--; draw(); } }
        function softDrop() { if (running && !paused && piece) { piece.y++; if (collides()) { piece.y--; land(); } draw(); } }
        function hardDrop() { if (running && !paused && piece) { while (!collides({...piece, y: piece.y + 1})) piece.y++; land(); draw(); } }

        function land() {
            piece.shape.forEach((row, r) => {
                row.forEach((val, c) => { if (val && piece.y + r >= 0) grid[piece.y + r][piece.x + c] = piece.color; });
            });
            clearLines();
            piece = nextPiece; nextPiece = randomPiece();
            if (collides()) gameOver();
            drawNext();
        }

        function clearLines() {
            let cleared = 0;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (grid[r].every(c => c !== null)) {
                    // Trigger Efek Suara & Partikel hanya di sini
                    playExplosionSound();
                    for (let c = 0; c < COLS; c++) createParticles(c, r, grid[r][c]);
                    
                    grid.splice(r, 1); grid.unshift(Array(COLS).fill(null));
                    cleared++; r++;
                }
            }
            if (cleared > 0) {
                score += [0, 100, 300, 500, 800][cleared] * level;
                lines += cleared; level = Math.floor(lines / 10) + 1;
                updateUI(); resetInterval();
            }
        }

        function resetInterval() {
            clearInterval(gameInterval);
            gameInterval = setInterval(() => { if(running && !paused) softDrop(); }, Math.max(100, 800 - (level * 50)));
        }

        function drawCell(targetCtx, x, y, color, isGhost = false) {
            targetCtx.fillStyle = isGhost ? color + "22" : color;
            targetCtx.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
            if (!isGhost) {
                targetCtx.fillStyle = "rgba(255,255,255,0.15)";
                targetCtx.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL/5);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, board.width, board.height);
            grid.forEach((row, r) => { row.forEach((color, c) => { if (color) drawCell(ctx, c, r, color); }); });
            if (piece) {
                let ghost = {...piece, shape: piece.shape.map(r => [...r])};
                while (!collides({...ghost, y: ghost.y + 1})) ghost.y++;
                ghost.shape.forEach((row, r) => { row.forEach((val, c) => { if (val && ghost.y + r >= 0) drawCell(ctx, ghost.x + c, ghost.y + r, piece.color, true); }); });
                piece.shape.forEach((row, r) => { row.forEach((val, c) => { if (val) drawCell(ctx, piece.x + c, piece.y + r, piece.color); }); });
            }
            updateAndDrawParticles();
            if (running) requestAnimationFrame(draw);
        }

        function drawNext() {
            nCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (!nextPiece) return;
            const ox = (4 - nextPiece.shape[0].length) / 2;
            const oy = (4 - nextPiece.shape.length) / 2;
            nextPiece.shape.forEach((row, r) => { row.forEach((val, c) => { if (val) drawCell(nCtx, c + ox, r + oy, nextPiece.color); }); });
        }

        function updateUI() { document.getElementById('score').textContent = score; document.getElementById('lines').textContent = lines; }
        function togglePause() { if (!running) return; paused = !paused; document.getElementById('overlay').style.display = paused ? 'flex' : 'none'; document.getElementById('overlay-msg').textContent = "PAUSED"; }
        function gameOver() { running = false; document.getElementById('overlay').style.display = 'flex'; document.getElementById('overlay-msg').textContent = "GAME OVER"; }
        
        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            grid = createGrid(); score = 0; lines = 0; level = 1;
            piece = randomPiece(); nextPiece = randomPiece();
            running = true; paused = false;
            document.getElementById('overlay').style.display = 'none';
            updateUI(); drawNext(); resetInterval(); draw();
        }

        resizeGame();
        window.addEventListener('resize', () => { resizeGame(); });
    </script>
</body>
</html>
