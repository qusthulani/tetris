<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tetris — KQ Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0d1117;
            font-family: 'Space Mono', monospace;
            color: white;
            user-select: none;
            -webkit-user-select: none;
        }

        .screen {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: clamp(8px, 2vh, 16px) clamp(8px, 2vw, 16px);
        }

        /* Top Bar */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 520px;
            flex-shrink: 0;
        }

        .back-btn {
            background: transparent;
            border: 1px solid #2a2a3e;
            color: #aaa;
            padding: clamp(5px, 1vh, 8px) clamp(10px, 2vw, 16px);
            border-radius: 20px;
            font-family: 'Space Mono', monospace;
            font-size: clamp(0.6em, 1.5vw, 0.8em);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .back-btn:hover { border-color: #00e5ff; color: #00e5ff; }

        .title {
            font-size: clamp(0.9em, 2.5vw, 1.3em);
            letter-spacing: 4px;
            color: #00e5ff;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .title span { font-size: 0.7em; }

        .pause-btn {
            background: #ff9800;
            border: none;
            color: white;
            padding: clamp(5px, 1vh, 8px) clamp(10px, 2vw, 16px);
            border-radius: 20px;
            font-family: 'Space Mono', monospace;
            font-size: clamp(0.6em, 1.5vw, 0.8em);
            cursor: pointer;
            transition: all 0.2s;
        }

        .pause-btn:hover { background: #e68900; }

        /* Game Area */
        .game-area {
            display: flex;
            gap: clamp(8px, 2vw, 15px);
            align-items: flex-start;
            flex: 1;
            width: 100%;
            max-width: 520px;
            justify-content: center;
            overflow: hidden;
        }

        .board-wrap {
            position: relative;
            flex-shrink: 0;
        }

        canvas#board {
            border: 1.5px solid #00e5ff;
            border-radius: 6px;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.15);
            display: block;
            background: #0a0e14;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(10, 14, 20, 0.92);
            border-radius: 6px;
        }

        .overlay-title {
            font-size: clamp(0.9em, 2.5vw, 1.3em);
            letter-spacing: 4px;
            color: #00e5ff;
        }

        .overlay-sub {
            font-size: clamp(0.55em, 1.5vw, 0.7em);
            color: #555;
            letter-spacing: 1px;
            text-align: center;
            line-height: 1.8;
        }

        .start-btn {
            background: #00e5ff;
            color: #000;
            border: none;
            padding: clamp(7px, 1.5vh, 10px) clamp(15px, 3vw, 25px);
            font-family: 'Space Mono', monospace;
            font-size: clamp(0.7em, 1.8vw, 0.85em);
            letter-spacing: 2px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s;
        }

        .start-btn:hover { background: #00cfea; transform: translateY(-2px); }

        /* Side Panel */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: clamp(6px, 1.5vh, 10px);
            flex-shrink: 0;
        }

        .panel-box {
            background: #111827;
            border: 1px solid #1e2433;
            border-radius: 8px;
            padding: clamp(8px, 1.5vh, 12px);
            min-width: clamp(70px, 15vw, 100px);
        }

        .panel-label {
            font-size: clamp(0.5em, 1.2vw, 0.6em);
            color: #444;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .panel-value {
            font-size: clamp(0.9em, 2.2vw, 1.2em);
            color: #fff;
            font-weight: 700;
        }

        #nextCanvas { display: block; margin: 5px auto 0; }

        /* Controls */
        .controls-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(5px, 1.5vh, 8px);
            flex-shrink: 0;
            width: 100%;
            max-width: 520px;
        }

        .controls-row {
            display: flex;
            gap: clamp(6px, 1.5vw, 8px);
        }

        .ctrl-btn {
            width: clamp(55px, 14vw, 70px);
            height: clamp(44px, 10vh, 55px);
            background: #111827;
            border: 1px solid #1e2433;
            border-radius: 10px;
            color: #fff;
            font-size: clamp(1em, 2.5vw, 1.2em);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .ctrl-btn.pause-ctrl { background: #ff9800; border-color: #ff9800; }
        .ctrl-btn:active { background: #1a2233; transform: scale(0.95); }
        .ctrl-btn.pause-ctrl:active { background: #e68900; }

        .keyboard-hint {
            font-size: clamp(0.5em, 1.2vw, 0.65em);
            color: #2a2a3e;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="screen">
        <div class="topbar">
            <a href="javascript:history.back()" class="back-btn">← Games</a>
            <div class="title"><span>✦</span> TETRIS <span>✦</span></div>
            <button class="pause-btn" onclick="togglePause()">⏸ PAUSE</button>
        </div>

        <div class="game-area">
            <div class="board-wrap">
                <canvas id="board"></canvas>
                <div class="overlay" id="overlay">
                    <div class="overlay-title">TETRIS</div>
                    <div class="overlay-sub">← → geser | ↑/Z putar<br>↓ soft drop | Spasi drop<br>P pause</div>
                    <button class="start-btn" id="startBtn">MULAI</button>
                </div>
            </div>

            <div class="side-panel">
                <div class="panel-box">
                    <div class="panel-label">Skor</div>
                    <div class="panel-value" id="score">0</div>
                </div>
                <div class="panel-box">
                    <div class="panel-label">Level</div>
                    <div class="panel-value" id="level">1</div>
                </div>
                <div class="panel-box">
                    <div class="panel-label">Baris</div>
                    <div class="panel-value" id="lines">0</div>
                </div>
                <div class="panel-box">
                    <div class="panel-label">Next</div>
                    <canvas id="nextCanvas"></canvas>
                </div>
            </div>
        </div>

        <div class="controls-wrap">
            <div class="controls-row">
                <button class="ctrl-btn" onclick="moveLeft()">◀</button>
                <button class="ctrl-btn" onclick="softDrop()">▼</button>
                <button class="ctrl-btn" onclick="moveRight()">▶</button>
            </div>
            <div class="controls-row">
                <button class="ctrl-btn" onclick="rotate()">↻</button>
                <button class="ctrl-btn pause-ctrl" onclick="togglePause()">⏸</button>
                <button class="ctrl-btn" onclick="hardDrop()">↓</button>
            </div>
            <div class="keyboard-hint">Keyboard: ← → ↓ | ↑/Z putar | Spasi drop | P pause</div>
        </div>
    </div>

    <script>
        const board = document.getElementById('board');
        const ctx = board.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nCtx = nextCanvas.getContext('2d');

        const COLS = 10, ROWS = 20;

        // Calculate cell size based on available space
        function calcCell() {
            const maxH = (window.innerHeight - 180) / ROWS;
            const maxW = (window.innerWidth - 160) / COLS;
            return Math.floor(Math.min(maxH, maxW, 30));
        }

        let CELL = calcCell();

        function resizeCanvas() {
            CELL = calcCell();
            board.width = COLS * CELL;
            board.height = ROWS * CELL;
            nextCanvas.width = 4 * CELL;
            nextCanvas.height = 4 * CELL;
            draw();
            drawNext();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Simple solid colors like screenshot
        const COLORS = {
            I: '#00bcd4',
            O: '#ffd600',
            T: '#9c27b0',
            S: '#4caf50',
            Z: '#f44336',
            J: '#1565c0',
            L: '#ff9800',
        };

        const SHAPES = {
            I: [[1,1,1,1]],
            O: [[1,1],[1,1]],
            T: [[0,1,0],[1,1,1]],
            S: [[0,1,1],[1,1,0]],
            Z: [[1,1,0],[0,1,1]],
            J: [[1,0,0],[1,1,1]],
            L: [[0,0,1],[1,1,1]],
        };

        let grid, piece, nextPiece, score, level, lines, running = false, paused = false, gameInterval;

        function createGrid() {
            return Array.from({length: ROWS}, () => Array(COLS).fill(null));
        }

        function randomPiece() {
            const types = Object.keys(SHAPES);
            const type = types[Math.floor(Math.random() * types.length)];
            return {
                type, shape: SHAPES[type].map(r => [...r]),
                x: Math.floor(COLS / 2) - Math.floor(SHAPES[type][0].length / 2),
                y: 0, color: COLORS[type]
            };
        }

        function collides(p = piece, g = grid) {
            for (let r = 0; r < p.shape.length; r++) {
                for (let c = 0; c < p.shape[r].length; c++) {
                    if (!p.shape[r][c]) continue;
                    const nx = p.x + c, ny = p.y + r;
                    if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
                    if (ny >= 0 && g[ny][nx]) return true;
                }
            }
            return false;
        }

        function rotate() {
            if (!running || paused || !piece) return;
            const rotated = piece.shape[0].map((_, i) =>
                piece.shape.map(row => row[i]).reverse()
            );
            const prev = piece.shape;
            piece.shape = rotated;
            if (collides()) {
                piece.x--;
                if (collides()) { piece.x += 2; if (collides()) { piece.x--; piece.shape = prev; } }
            }
            draw();
        }

        function moveLeft() {
            if (!running || paused || !piece) return;
            piece.x--; if (collides()) piece.x++; draw();
        }

        function moveRight() {
            if (!running || paused || !piece) return;
            piece.x++; if (collides()) piece.x--; draw();
        }

        function softDrop() {
            if (!running || paused || !piece) return;
            piece.y++; if (collides()) { piece.y--; land(); } draw();
        }

        function hardDrop() {
            if (!running || paused || !piece) return;
            while (!collides({...piece, y: piece.y + 1})) piece.y++;
            land(); draw();
        }

        function mergePiece() {
            piece.shape.forEach((row, r) => {
                row.forEach((val, c) => {
                    if (val && piece.y + r >= 0) grid[piece.y + r][piece.x + c] = piece.color;
                });
            });
        }

        function clearLines() {
            let cleared = 0;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (grid[r].every(c => c !== null)) {
                    grid.splice(r, 1); grid.unshift(Array(COLS).fill(null));
                    cleared++; r++;
                }
            }
            if (cleared > 0) {
                const pts = [0, 100, 300, 500, 800];
                score += (pts[cleared] || 800) * level;
                lines += cleared;
                level = Math.floor(lines / 10) + 1;
                updateUI(); resetInterval();
            }
        }

        function land() {
            mergePiece(); clearLines();
            piece = nextPiece; nextPiece = randomPiece();
            if (collides()) return gameOver();
            drawNext();
        }

        function tick() {
            if (!running || paused) return;
            piece.y++; if (collides()) { piece.y--; land(); } draw();
        }

        function resetInterval() {
            clearInterval(gameInterval);
            gameInterval = setInterval(tick, Math.max(80, 600 - (level - 1) * 55));
        }

        function drawCell(c, x, y, color, alpha = 1) {
            // Solid block like screenshot
            c.globalAlpha = alpha;
            c.fillStyle = color;
            c.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
            // Highlight top-left
            c.fillStyle = 'rgba(255,255,255,0.3)';
            c.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, 3);
            c.fillRect(x * CELL + 1, y * CELL + 1, 3, CELL - 2);
            // Shadow bottom-right
            c.fillStyle = 'rgba(0,0,0,0.3)';
            c.fillRect(x * CELL + 1, y * CELL + CELL - 3, CELL - 2, 2);
            c.fillRect(x * CELL + CELL - 3, y * CELL + 1, 2, CELL - 2);
            c.globalAlpha = 1;
        }

        function draw() {
            ctx.clearRect(0, 0, board.width, board.height);

            // Grid lines
            ctx.strokeStyle = '#0f1520';
            ctx.lineWidth = 0.5;
            for (let x = 0; x <= COLS; x++) {
                ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, board.height); ctx.stroke();
            }
            for (let y = 0; y <= ROWS; y++) {
                ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(board.width, y * CELL); ctx.stroke();
            }

            // Placed pieces
            grid.forEach((row, r) => {
                row.forEach((color, c) => { if (color) drawCell(ctx, c, r, color); });
            });

            if (piece) {
                // Ghost
                let ghost = {...piece, shape: piece.shape.map(r => [...r])};
                while (!collides({...ghost, y: ghost.y + 1})) ghost.y++;
                ghost.shape.forEach((row, r) => {
                    row.forEach((val, c) => {
                        if (val && ghost.y + r >= 0) drawCell(ctx, ghost.x + c, ghost.y + r, piece.color, 0.15);
                    });
                });

                // Active piece
                piece.shape.forEach((row, r) => {
                    row.forEach((val, c) => { if (val) drawCell(ctx, piece.x + c, piece.y + r, piece.color); });
                });
            }
        }

        function drawNext() {
            nCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (!nextPiece) return;
            const ox = Math.floor((4 - nextPiece.shape[0].length) / 2);
            const oy = Math.floor((4 - nextPiece.shape.length) / 2);
            nextPiece.shape.forEach((row, r) => {
                row.forEach((val, c) => { if (val) drawCell(nCtx, ox + c, oy + r, nextPiece.color); });
            });
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lines').textContent = lines;
        }

        function togglePause() {
            if (!running) return;
            paused = !paused;
            document.querySelector('.pause-btn').textContent = paused ? '▶ LANJUT' : '⏸ PAUSE';
            const overlay = document.getElementById('overlay');
            if (paused) {
                overlay.innerHTML = `
                    <div class="overlay-title">PAUSED</div>
                    <button class="start-btn" onclick="togglePause()">LANJUT</button>
                `;
                overlay.style.display = 'flex';
            } else {
                overlay.style.display = 'none';
                document.querySelector('.pause-btn').textContent = '⏸ PAUSE';
            }
        }

        function gameOver() {
            clearInterval(gameInterval); running = false;
            const overlay = document.getElementById('overlay');
            overlay.innerHTML = `
                <div class="overlay-title">GAME OVER</div>
                <div class="overlay-sub">Skor: ${score} | Level: ${level}</div>
                <button class="start-btn" onclick="startGame()">MAIN LAGI</button>
            `;
            overlay.style.display = 'flex';
        }

        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            document.querySelector('.pause-btn').textContent = '⏸ PAUSE';
            grid = createGrid(); piece = randomPiece(); nextPiece = randomPiece();
            score = 0; level = 1; lines = 0; paused = false;
            updateUI(); drawNext(); running = true; resetInterval(); draw();
        }

        document.addEventListener('keydown', e => {
            if (!running && e.key === 'Enter') return startGame();
            if (!running) return;
            if (e.key === 'ArrowLeft') { e.preventDefault(); moveLeft(); }
            if (e.key === 'ArrowRight') { e.preventDefault(); moveRight(); }
            if (e.key === 'ArrowDown') { e.preventDefault(); softDrop(); }
            if (e.key === 'ArrowUp' || e.key === 'z' || e.key === 'Z') { e.preventDefault(); rotate(); }
            if (e.key === ' ') { e.preventDefault(); hardDrop(); }
            if (e.key === 'p' || e.key === 'P') togglePause();
        });

        document.getElementById('startBtn').addEventListener('click', startGame);
        draw();
    </script>
</body>
</html>
